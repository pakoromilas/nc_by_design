# === General settings ===
print_freq: 10
save_freq: 50
batch_size: 256
num_workers: 16
epochs: 500

# === Optimization ===
learning_rate: 0.2
lr_decay_epochs: "350,400,450"
lr_decay_rate: 0.1
weight_decay: 0.0001
momentum: 0.9

# === Loss settings ===
normalize: false
loss: "CE"  # options: "CE", "NormFace", "NTCE", "NONL"
temperature: 0.2

# === Model / Dataset ===
model: "resnet18"
dataset: "cifar10"  # options: "cifar10", "cifar100"

# === Training behavior ===
cosine: false
syncBN: false
warm: false
trial: "0"
